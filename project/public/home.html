<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IndiGO–Home</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>


    <!-- Main Card -->
    <div class="mainCard">
      

      <!-- Timeline -->
      <div class="languagePath">


        <div class="step">
          <button class="lessonButton"><img src="./media/images/studyHat.png" alt="Learning exercise"></button>
        </div>

        <div class="step">
          <button class="lessonButton"><img src="./media/images/pencil.png" alt="Writing exercise"></button>
        </div>

        <div class="step">
          <button class="lessonButton"><img src="./media/images/speech.png" alt="Speaking exercise"></button>
        </div>

      </div>

      <!-- Character -->
      <div class="character">
        <img src="./media/mascot/mascot_protoype_lookingUp.png" alt="">
      </div>
      
    
    </div>
    <!-- Bottom Navigation -->
    <nav class="bottomNav"
      <button class="bottomNavButton"><img src="./media/images/menu.png" alt="Menu"></button>
      <button class="bottomNavButton"><img src="./media/images/settings.png" alt="Settings"></button>
      <button class="bottomNavButton"><img src="./media/images/profile.png" alt="Profile"></button>
      <button class="bottomNavButton"><img src="./media/images/placeholderLanguage.png" alt="Language"></button>
      <button class="bottomNavButton"><img src="./media/images/fire.gif" alt="Streak"></button>
    </nav>


</body>
</html>
