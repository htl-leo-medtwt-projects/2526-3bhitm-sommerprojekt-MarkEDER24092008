<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile</title>
    <link rel="stylesheet" href="./css/generalStyle.css">
    <link rel="stylesheet" href="./css/profileStyle.css">
</head>
<body>

    <div class="profile-screen">

    <!-- Back Button -->
    <a class="backButton" href="./home.html">
        <img src="./media/images/backButton.png" alt="Go Back">
    </a>

    <!-- Title -->
    <h1 class="title">Your Profile</h1>

    <!-- Profile Card -->
    <section class="card" id="profile-card">

      <!-- Profile Icon -->
      <div class="profile-icon">
        👤
      </div>

      <!-- User Info -->
      <div class="info-section">

        <div class="info-row">
          <span>Username:</span>
          <span>_User_</span>
        </div>

        <div class="info-row">
          <span>Password:</span>
          <span>(click to preview)</span>
        </div>

      </div>

      <!-- Stats -->
      <div class="stats-section">

        <div class="info-row">
          <span>Date Created:</span>
          <span>dd.MM.yyyy</span>
        </div>

        <div class="info-row">
          <span>Highest Streak:</span>
          <span>99</span>
        </div>

      </div>

      <!-- Current Language -->
      <div class="study-section">

        <div class="info-row">
          <span>Currently Studying:</span>

          <div class="language-info">
            <img src="./media/images/placeholderLanguage.png" alt="">
          </div>
        </div>

      </div>

      <!-- Sign Out Button -->
      <button class="signout-button">
        Sign Out
      </button>

    </section>

  </div>


    <nav class="bottomNav">
      <a href="./settings.html">
        <div class="bottomNavButton"><img src="./media/images/settings.png" alt="Settings"></div>
      </a>

      
      <a href="./profile.html">
        <div class="bottomNavButton"><img src="./media/images/profile.png" alt="Profile"></div>
      </a>

      <a href="./language.html">
        <div class="bottomNavButton"><img src="./media/images/placeholderLanguage.png" alt="Language"></div>
      </a>

      <a href="./streak.html">
        <div class="bottomNavButton"><img src="./media/images/fire.gif" alt="Streak"></div>
      </a>
    </nav>
    
</body>
</html>
