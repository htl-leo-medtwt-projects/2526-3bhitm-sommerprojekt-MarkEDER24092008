<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New User</title>
    <link rel="stylesheet" href="./css/generalStyle.css">
    <link rel="stylesheet" href="./css/formStyle.css">
    <script src="./js/script.js" defer></script>
</head>
<body>
    <h1 class="title">Create New User</h1>
    <div class="card">
        <form method="POST" action="./sql/createUserMySql.php">
            <input placeholder="Username" type="text" name="username" required> <br>
            <input placeholder="Email" type="email" name="email"> <br>
            <div class="password-wrapper">
                <input placeholder="Password" type="password" name="password" required id="passwordInput">
                <img id="eye" onclick="togglePasswordVisibility()" src="./media/images/privacyHiding.png" alt="Show Password">
            </div>
            <input type="submit" name="submit" value="Create New User">
        </form>
    </div>

    <nav class="bottomNav">

        <div class="bottomNavButton"><img src="./media/images/home.png" alt="Home"></div>
      </a>

        <div class="bottomNavButton"><img src="./media/images/settings.png" alt="Settings"></div>
      </a>

      <a href="./profile.html">
        <div class="bottomNavButton"><img src="./media/images/profile.png" alt="Profile"></div>
      </a>

      <a href="./language.html">
        <div class="bottomNavButton"><img src="./media/images/placeholderLanguage.png" alt="Language"></div>
      </a>

      <a href="./streak.html">
        <div class="bottomNavButton"><img src="./media/images/fire.gif" alt="Streak"></div>
      </a>
    </nav>
